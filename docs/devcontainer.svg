<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 16 16">
  <title>Dev Containers templating</title>
  <desc>The original Dev Containers logo with a smaller reusable template document badge at the upper right.</desc>

  <defs>
    <linearGradient id="template-fill" x1="9.25" y1="1" x2="14.65" y2="6.6" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b98af1"/>
      <stop offset="1" stop-color="#9270df"/>
    </linearGradient>
    <linearGradient id="template-fold" x1="12.7" y1="1" x2="14.65" y2="3" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d5b8fa"/>
      <stop offset="1" stop-color="#b89af0"/>
    </linearGradient>
  </defs>

  <!-- Small template badge, positioned behind the main logo -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <path
      d="M9.35 1.25h3.35l1.95 1.95v3.55a.65.65 0 0 1-.65.65H10a.65.65 0 0 1-.65-.65Z"
      fill="url(#template-fill)"
      stroke="#c6a0f6"
      stroke-width=".42"
    />
    <path
      d="M12.7 1.25V2.8a.4.4 0 0 0 .4.4h1.55Z"
      fill="url(#template-fold)"
    />

    <!-- Replaceable template fields -->
    <path d="M10.2 2.75h2.05" fill="none" stroke="#f5a97f" stroke-width=".42"/>
    <path d="M10.2 3.65h1.35" fill="none" stroke="#f5a97f" stroke-width=".42"/>
    <path d="M12.15 3.65h.55" fill="none" stroke="#f5a97f" stroke-width=".42"/>

    <!-- Template syntax -->
    <path
      d="M10.85 4.55c-.42 0-.55.18-.55.5v.22c0 .24-.12.38-.36.38.24 0 .36.14.36.38v.22c0 .32.13.5.55.5"
      fill="none"
      stroke="#eed49f"
      stroke-width=".42"
    />
    <path
      d="M13.15 4.55c.42 0 .55.18.55.5v.22c0 .24.12.38.36.38-.24 0-.36.14-.36.38v.22c0 .32-.13.5-.55.5"
      fill="none"
      stroke="#eed49f"
      stroke-width=".42"
    />
  </g>

  <!-- Original Dev Containers logo, preserved exactly -->
  <path fill="none" stroke="#91d7e3" stroke-linecap="round" stroke-linejoin="round" d="M1.5 4v8L8 14.5l6.5-2.5V4L8 1.5Z"/>
  <path fill="none" stroke="#91d7e3" stroke-linecap="round" stroke-linejoin="round" d="M4.5 5.5L8 7l3.5-1.5M8 7v4"/>
</svg>
