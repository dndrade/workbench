name: "Bug: Workbench Image"
description: Report a problem with the published Workbench container image
labels: ["bug", "image"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for problems with `ghcr.io/dndrade/workbench-svelte`.
        Template application or generation problems belong in the template bug form.

  - type: input
    id: image
    attributes:
      label: Image reference
      description: Include the registry, repository, and tag.
      placeholder: "ghcr.io/dndrade/workbench-svelte:0.2.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Host platform
      description: Operating system, architecture, and container runtime.
      placeholder: "Ubuntu 24.04, amd64, Docker 27"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Pull or build the image
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, tokens, and other sensitive values.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this problem
          required: true
        - label: I reproduced this with a currently supported image tag
          required: true
        - label: I removed secrets and personal data from the report
          required: true
