name: "Feature request"
description: Suggest an addition or change to the image, template, automation, or documentation
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Published image
        - Svelte Dev Container Template
        - Build and test scripts
        - CI/CD and releases
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or limitation
      description: Describe the current limitation before proposing a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Explain the desired behavior and any relevant interface or configuration changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other approaches you considered.

  - type: textarea
    id: impact
    attributes:
      label: Compatibility and release impact
      description: Note possible breaking changes, migration needs, or image/template dependency changes.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this request
          required: true
        - label: This request is scoped to one clear problem or capability
          required: true
