name: Publish Workbench Images

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag created by release-please (e.g. workbench-base-v0.2.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re-)publish, e.g. workbench-base-v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: workbench-images-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/validate-image.yaml

  publish-image:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: .github/scripts/resolve-image-tags.sh

      - name: Build and publish base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.base }}
          cache-from: type=gha,scope=workbench-base
          cache-to: type=gha,mode=max,scope=workbench-base

      - name: Check for Svelte image
        id: svelte
        shell: bash
        run: |
          if [[ -f docker/svelte/Dockerfile ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "docker/svelte/Dockerfile does not exist yet; publishing only the base image."
          fi

      - name: Build and publish Svelte image
        if: steps.svelte.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/svelte/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.svelte }}
          build-args: |
            BASE_IMAGE=${{ steps.tags.outputs.base_reference }}
          cache-from: type=gha,scope=workbench-svelte
          cache-to: type=gha,mode=max,scope=workbench-svelte