name: Publish Workbench Image

on:
  workflow_dispatch:

  workflow_run:
    workflows:
      - Publish Workbench Image
    types:
      - completed

permissions:
  contents: write
  packages: write

concurrency:
  group: workbench-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/validate.yaml

  publish:
    needs: validate

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          sha_tag="sha-${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            major_minor="${version%.*}"
            major="${version%%.*}"
            tags="${version},${major_minor},${major},${sha_tag}"
          else
            tags="main,${sha_tag}"
          fi

          echo "value=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build, smoke-test, and publish Dev Container image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/workbench-svelte
          imageTag: ${{ steps.tags.outputs.value }}
          push: always
          runCmd: |
            test "$(bun --version)" = "1.3.14"
            fish --version
            git --version
            test "$(getent passwd vscode | cut -d: -f7)" = "/usr/bin/fish"

      - name: Create GitHub release
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi