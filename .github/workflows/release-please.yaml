name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      image-released: ${{ steps.release.outputs['docker/base--release_created'] }}
      image-tag: ${{ steps.release.outputs['docker/base--tag_name'] }}
      template-released: ${{ steps.release.outputs['src/svelte--release_created'] }}
      template-tag: ${{ steps.release.outputs['src/svelte--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4

  publish-image:
    needs: [release-please]
    if: needs.release-please.outputs.image-released == 'true'
    uses: ./.github/workflows/publish-image.yaml
    with:
      tag: ${{ needs.release-please.outputs.image-tag }}
    secrets: inherit

  publish-template:
    needs: [release-please, publish-image]
    if: always() && needs.release-please.outputs.template-released == 'true' && (needs.publish-image.result == 'success' || needs.publish-image.result == 'skipped')
    uses: ./.github/workflows/publish-template.yaml
    with:
      tag: ${{ needs.release-please.outputs.template-tag }}
    secrets: inherit
