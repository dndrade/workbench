name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-image:
    name: Validate image
    uses: ./.github/workflows/_validate-image.yaml
    with:
      ref: ${{ github.sha }}

  validate-template:
    name: Validate template
    uses: ./.github/workflows/_validate-template.yaml
    with:
      ref: ${{ github.sha }}
      template: svelte
