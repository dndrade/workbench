name: Publish template

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag created by Release Please
        required: true
        type: string
      template:
        description: Template identifier under src/
        required: false
        type: string
        default: svelte
      registry:
        description: OCI registry hostname
        required: false
        type: string
        default: ghcr.io
      namespace:
        description: OCI namespace; defaults to the lowercase repository name
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, such as template/svelte-v0.1.1
        required: true
        type: string
      template:
        description: Template identifier under src/
        required: false
        type: string
        default: svelte
      registry:
        description: OCI registry hostname
        required: false
        type: string
        default: ghcr.io
      namespace:
        description: OCI namespace; defaults to the lowercase repository name
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: publish-template-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release template
    uses: ./.github/workflows/_validate-template.yaml
    with:
      ref: ${{ inputs.tag }}
      template: ${{ inputs.template }}

  publish:
    name: Publish template
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up workflow tooling
        uses: ./.github/actions/setup-tooling
        with:
          require-docker: "true"
          require-shellcheck: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve template contract
        id: contract
        shell: bash
        env:
          TEMPLATE_ID: ${{ inputs.template }}
          REQUESTED_NAMESPACE: ${{ inputs.namespace }}
          DEFAULT_NAMESPACE: ${{ github.repository }}
        run: ./scripts/template/contract.sh >> "${GITHUB_OUTPUT}"

      - name: Verify referenced image exists
        uses: ./.github/actions/verify-image-exists
        with:
          image: ${{ steps.contract.outputs.image }}
          required: "true"

      - name: Log in to GHCR
        if: inputs.registry == 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish template
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry }}
          NAMESPACE: ${{ steps.contract.outputs.namespace }}
        run: |
          set -euo pipefail
          task template:publish \
            ID="${{ inputs.template }}" \
            REGISTRY="${REGISTRY}" \
            NAMESPACE="${NAMESPACE}"