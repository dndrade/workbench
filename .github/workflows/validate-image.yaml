name: Validate Image

on:
  workflow_call:
  pull_request:
    paths:
      - "docker/**"
      - ".github/actions/smoke-test/**"
      - ".github/scripts/**"
      - ".github/workflows/validate-image.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail

          shellcheck docker/base/scripts/*.sh .github/scripts/*.sh .github/actions/smoke-test/*.sh
          bash -n docker/base/scripts/*.sh .github/scripts/*.sh .github/actions/smoke-test/*.sh

      - name: Resolve expected image config from Dockerfile
        # Single source of truth: read the ARG defaults straight out of the
        # Dockerfile instead of hardcoding them a second time here.
        id: image_config
        shell: bash
        run: |
          set -euo pipefail

          bun_version="$(grep -oP '(?<=^ARG BUN_VERSION=).+' docker/base/Dockerfile)"
          username="$(grep -oP '(?<=^ARG USERNAME=).+' docker/base/Dockerfile)"

          if [[ -z "${bun_version}" ]]; then
            echo "Could not resolve BUN_VERSION from docker/base/Dockerfile" >&2
            exit 1
          fi

          if [[ -z "${username}" ]]; then
            echo "Could not resolve USERNAME from docker/base/Dockerfile" >&2
            exit 1
          fi

          echo "bun_version=${bun_version}" >> "$GITHUB_OUTPUT"
          echo "username=${username}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile
          load: true
          push: false
          tags: workbench-base:test
          cache-from: type=gha,scope=workbench-base
          cache-to: type=gha,mode=max,scope=workbench-base

      - name: Smoke-test base image
        uses: ./.github/actions/smoke-test
        with:
          image: workbench-base:test
          expected-bun-version: ${{ steps.image_config.outputs.bun_version }}
          expected-username: ${{ steps.image_config.outputs.username }}

      - name: Check for Svelte image
        id: svelte
        shell: bash
        run: |
          if [[ -f docker/svelte/Dockerfile ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "docker/svelte/Dockerfile does not exist yet; skipping Svelte image validation."
          fi

      - name: Build Svelte image
        if: steps.svelte.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/svelte/Dockerfile
          load: true
          push: false
          tags: workbench-svelte:test
          build-args: |
            BASE_IMAGE=workbench-base:test
          cache-from: type=gha,scope=workbench-svelte
          cache-to: type=gha,mode=max,scope=workbench-svelte

      - name: Smoke-test Svelte image
        if: steps.svelte.outputs.exists == 'true'
        uses: ./.github/actions/smoke-test
        with:
          image: workbench-svelte:test
          expected-bun-version: ${{ steps.image_config.outputs.bun_version }}
          expected-username: ${{ steps.image_config.outputs.username }}