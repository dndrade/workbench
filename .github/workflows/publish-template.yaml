name: Publish Dev Container Template

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  validate:
    uses: ./.github/workflows/validate.yaml

  publish:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish template
        uses: devcontainers/action@v1
        with:
          publish-templates: "true"
          base-path-to-templates: "./templates/devcontainers"
          generate-docs: "false"
          oci-registry-for-templates: "ghcr.io"
          templates-namespace: "dndrade/workbench"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}