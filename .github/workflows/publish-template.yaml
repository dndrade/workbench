name: Publish Dev Container Templates

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag created by release-please (e.g. template/svelte-v0.1.1)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re-)publish, e.g. template/svelte-v0.1.1"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: workbench-templates-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  wait-for-image:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for image publish
        uses: lewagon/wait-on-check-action@v1.8.1
        with:
          ref: ${{ github.sha }}
          check-name: "publish-image"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          timeout-seconds: 1800

  validate:
    needs: [wait-for-image]
    if: always() && (needs.wait-for-image.result == 'success' || needs.wait-for-image.result == 'skipped')
    uses: ./.github/workflows/validate-template.yaml

  publish:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Resolve template namespace
        id: namespace
        shell: bash
        run: |
          set -euo pipefail
          echo "namespace=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Publish templates
        uses: devcontainers/action@v1
        with:
          publish-templates: "true"
          base-path-to-templates: "./src"
          generate-docs: "false"
          oci-registry-for-templates: "ghcr.io"
          templates-namespace: ${{ steps.namespace.outputs.namespace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}