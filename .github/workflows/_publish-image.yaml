name: Publish image

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag created by Release Please
        required: true
        type: string
      image-repository:
        description: Fully qualified image repository without a tag
        required: false
        type: string
        default: ghcr.io/dndrade/workbench-svelte
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, such as workbench-base-v0.2.0
        required: true
        type: string
      image-repository:
        description: Fully qualified image repository without a tag
        required: false
        type: string
        default: ghcr.io/dndrade/workbench-svelte

permissions:
  contents: read

concurrency:
  group: publish-image-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release image
    uses: ./.github/workflows/_validate-image.yaml
    with:
      ref: ${{ inputs.tag }}
      image: workbench-release:test

  publish:
    name: Publish image
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up workflow tooling
        uses: ./.github/actions/setup-tooling
        with:
          require-docker: "true"
          require-shellcheck: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve release version
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: ./scripts/image/version.sh >> "${GITHUB_OUTPUT}"

      - name: Resolve image contract
        id: contract
        shell: bash
        env:
          DOCKERFILE: docker/base/Dockerfile
        run: ./scripts/image/contract.sh >> "${GITHUB_OUTPUT}"

      - name: Build release image
        shell: bash
        env:
          IMAGE: workbench-release:test
          DOCKERFILE: docker/base/Dockerfile
          CONTEXT: .
          PLATFORM: linux/amd64
          LOAD: "true"
          BUILD_CACHE_FROM: type=gha,scope=workbench-release
          BUILD_CACHE_TO: type=gha,mode=max,scope=workbench-release
        run: ./scripts/image/build.sh

      - name: Test release image
        shell: bash
        env:
          IMAGE: workbench-release:test
          EXPECTED_BUN_VERSION: ${{ steps.contract.outputs.bun-version }}
          EXPECTED_USERNAME: ${{ steps.contract.outputs.username }}
        run: ./scripts/image/test.sh

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release image
        shell: bash
        env:
          IMAGE_REPOSITORY: ${{ inputs.image-repository }}
          VERSION: ${{ steps.release.outputs.version }}
          SOURCE_IMAGE: workbench-release:test
          PUBLISH_LATEST: "false"
        run: ./scripts/image/publish.sh

      - name: Verify published major tag
        uses: ./.github/actions/verify-image-exists
        with:
          image: ${{ inputs.image-repository }}:${{ steps.release.outputs.major }}
          required: "true"
