name: Validate image

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to validate
        required: false
        type: string
        default: ""
      image:
        description: Local image tag used during validation
        required: false
        type: string
        default: workbench-base:test

permissions:
  contents: read

jobs:
  validate:
    name: Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up workflow tooling
        uses: ./.github/actions/setup-tooling
        with:
          require-docker: "true"
          require-shellcheck: "true"

      - name: Validate image shell scripts
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t scripts < <(
            find \
              docker/base/scripts \
              scripts/image \
              .github/actions/smoke-test \
              -type f -name '*.sh' -print
          )

          if (( ${#scripts[@]} == 0 )); then
            echo "No image shell scripts were found" >&2
            exit 1
          fi

          shellcheck "${scripts[@]}"
          bash -n "${scripts[@]}"

      - name: Resolve image contract
        id: contract
        shell: bash
        env:
          DOCKERFILE: docker/base/Dockerfile
        run: ./scripts/image/contract.sh >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        shell: bash
        env:
          IMAGE: ${{ inputs.image }}
          DOCKERFILE: docker/base/Dockerfile
          CONTEXT: .
          PLATFORM: linux/amd64
          LOAD: "true"
          BUILD_CACHE_FROM: type=gha,scope=workbench-base
          BUILD_CACHE_TO: type=gha,mode=max,scope=workbench-base
        run: ./scripts/image/build.sh

      - name: Test image
        shell: bash
        env:
          IMAGE: ${{ inputs.image }}
          EXPECTED_BUN_VERSION: ${{ steps.contract.outputs.bun-version }}
          EXPECTED_USERNAME: ${{ steps.contract.outputs.username }}
        run: ./scripts/image/test.sh
