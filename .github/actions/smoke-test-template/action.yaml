name: Smoke test template
description: >
  Copies a Dev Container Template into an isolated workspace, applies default
  options, starts it with the Dev Container CLI, and runs its matching tests.

inputs:
  template:
    description: Template identifier under src/
    required: true
  image:
    description: Optional image reference used instead of the published image
    required: false
    default: ""
  expected-bun-version:
    description: Expected output from bun --version
    required: true
  expected-username:
    description: Expected primary container user
    required: true

runs:
  using: composite
  steps:
    - name: Build template workspace
      shell: bash
      env:
        TEMPLATE_ID: ${{ inputs.template }}
        IMAGE: ${{ inputs.image }}
      run: '"${{ github.action_path }}/build.sh"'

    - name: Run template smoke test
      shell: bash
      env:
        TEMPLATE_ID: ${{ inputs.template }}
        EXPECTED_BUN_VERSION: ${{ inputs.expected-bun-version }}
        EXPECTED_USERNAME: ${{ inputs.expected-username }}
      run: '"${{ github.action_path }}/test.sh"'