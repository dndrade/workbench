name: Smoke test workbench image
description: >
  Runs a built Workbench image and verifies the tools and user configuration
  baked into it match the Dockerfile contract.

inputs:
  image:
    description: Local Docker image reference to test
    required: true
  expected-bun-version:
    description: Expected output from bun --version
    required: true
  expected-username:
    description: Expected primary container user
    required: true

runs:
  using: composite
  steps:
    - name: Run image smoke test
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        EXPECTED_BUN_VERSION: ${{ inputs.expected-bun-version }}
        EXPECTED_USERNAME: ${{ inputs.expected-username }}
      run: '"${{ github.action_path }}/test.sh"'